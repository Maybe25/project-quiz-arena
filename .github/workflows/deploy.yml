name: Deploy

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  TF_VERSION: "1.7.0"
  AWS_REGION: "us-east-1"

jobs:
  deploy:
    name: Deploy to AWS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Package Lambdas (Python)
        run: bash scripts/build.sh

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: infrastructure/terraform
        run: terraform init

      - name: Terraform Apply IAM (bootstrap permisos)
        working-directory: infrastructure/terraform
        run: terraform apply -auto-approve -target=aws_iam_role_policy.github_actions_deploy

      - name: Esperar propagación IAM
        run: sleep 15

      - name: Terraform Apply
        working-directory: infrastructure/terraform
        run: terraform apply -auto-approve

      - name: Sync questions to S3
        working-directory: infrastructure/terraform
        run: |
          BUCKET=$(terraform output -raw s3_questions_bucket)
          aws s3 sync ../../questions/ s3://$BUCKET/questions/ \
            --delete \
            --only-show-errors
          echo "✓ Questions synced to s3://$BUCKET/questions/"

      - name: Show deployment outputs
        working-directory: infrastructure/terraform
        run: terraform output
