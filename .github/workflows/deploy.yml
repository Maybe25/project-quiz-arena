# Deploy — se ejecuta cuando se hace merge a main
#
# Qué hace:
#   1. Compila todas las Lambdas Go para Linux ARM64
#   2. Ejecuta terraform apply — despliega los cambios en AWS
#
# El deploy es automático en merge a main (entorno dev).
# Para prod, agrega un environment con required_reviewers en GitHub.

name: Deploy

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  GO_VERSION: "1.24"
  TF_VERSION: "1.7.0"
  AWS_REGION: "us-east-1"

jobs:
  deploy:
    name: Deploy to AWS
    runs-on: ubuntu-latest

    # environment: dev
    # Descomenta la línea de arriba y configura el environment en GitHub
    # (Settings → Environments → dev) para agregar aprobación manual.

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download dependencies
        run: |
          cd internal              && go mod download && cd ..
          cd lambdas/ws-connect    && go mod download && cd ../..
          cd lambdas/ws-disconnect && go mod download && cd ../..
          cd lambdas/ws-message    && go mod download && cd ../..
          cd lambdas/room-manager  && go mod download && cd ../..
          cd lambdas/broadcaster   && go mod download && cd ../..

      - name: Build all Lambdas (Linux ARM64)
        run: bash scripts/build.sh

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: infrastructure/terraform
        run: terraform init

      - name: Terraform Apply
        working-directory: infrastructure/terraform
        run: terraform apply -auto-approve

      # Mostrar outputs útiles al final del deploy (URL del WebSocket, etc.)
      - name: Show deployment outputs
        working-directory: infrastructure/terraform
        run: terraform output
