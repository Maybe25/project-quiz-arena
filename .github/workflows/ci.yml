# CI — se ejecuta en cada Pull Request hacia main
#
# Qué hace:
#   1. Compila todas las Lambdas Go para Linux ARM64
#   2. Corre go vet (análisis estático de código)
#   3. Corre terraform plan — muestra qué cambiaría en AWS sin aplicar nada
#
# El plan de Terraform aparece como comentario en el PR para revisión.

name: CI

on:
  pull_request:
    branches:
      - main

# Permisos mínimos necesarios:
#   id-token: write  → para que GitHub genere el token OIDC
#   contents: read   → para hacer checkout del código
#   pull-requests: write → para comentar el plan de Terraform en el PR
permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  GO_VERSION: "1.24"
  TF_VERSION: "1.7.0"
  AWS_REGION: "us-east-1"

jobs:
  build:
    name: Build Lambdas
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true  # cachea el módulo cache de Go entre runs

      - name: Download dependencies
        run: |
          cd internal        && go mod download && cd ..
          cd lambdas/ws-connect    && go mod download && cd ../..
          cd lambdas/ws-disconnect && go mod download && cd ../..
          cd lambdas/ws-message    && go mod download && cd ../..
          cd lambdas/room-manager  && go mod download && cd ../..
          cd lambdas/broadcaster   && go mod download && cd ../..

      - name: Build all Lambdas (Linux ARM64)
        run: bash scripts/build.sh

      - name: Go vet (análisis estático)
        run: |
          cd internal        && go vet ./... && cd ..
          cd lambdas/ws-connect    && go vet ./... && cd ../..
          cd lambdas/ws-disconnect && go vet ./... && cd ../..
          cd lambdas/ws-message    && go vet ./... && cd ../..
          cd lambdas/room-manager  && go vet ./... && cd ../..
          cd lambdas/broadcaster   && go vet ./... && cd ../..

      # Subir los binarios compilados como artifacts para que el job de plan los use
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lambda-binaries
          path: bin/
          retention-days: 1

  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: build  # espera a que el build sea exitoso

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: lambda-binaries
          path: bin/

      # Autenticación con AWS via OIDC — sin credenciales almacenadas
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: infrastructure/terraform
        run: terraform init

      - name: Terraform Validate
        working-directory: infrastructure/terraform
        run: terraform validate

      - name: Terraform Plan
        id: plan
        working-directory: infrastructure/terraform
        run: |
          terraform plan -no-color -out=tfplan 2>&1 | tee plan_output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        continue-on-error: true  # no fallar el job si hay cambios, mostrarlos en el PR

      # Publicar el plan como comentario en el PR para revisión
      - name: Comment plan on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('infrastructure/terraform/plan_output.txt', 'utf8');
            const maxLen = 60000;
            const truncated = plan.length > maxLen
              ? plan.substring(0, maxLen) + '\n... (truncado)'
              : plan;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Terraform Plan\n\`\`\`hcl\n${truncated}\n\`\`\``
            });

      - name: Fail if plan failed
        if: steps.plan.outputs.exit_code != '0' && steps.plan.outputs.exit_code != '2'
        run: exit 1
        # exit code 2 = hay cambios (normal), 0 = sin cambios, 1 = error real
